edp_analytics:
  target: local
  outputs:
    local:
      type: duckdb

      # DuckDB writes a persistent database file here. The /tmp path keeps it
      # out of the project directory and off the Docker volume mount.
      path: /tmp/edp_analytics.duckdb

      threads: 4

      # dbt-duckdb reads external Parquet sources automatically when a source
      # table defines `meta.external_location` in _sources.yml. No additional
      # plugin configuration is required — the dbt-duckdb adapter handles it.
      #
      # The parquet and httpfs extensions are loaded by DuckDB on first use.
      # If you hit a "parquet extension not found" error on an older DuckDB
      # version, add the following to force-load them:
      #
      #   settings:
      #     autoinstall_known_extensions: true
      #     autoload_known_extensions: true
