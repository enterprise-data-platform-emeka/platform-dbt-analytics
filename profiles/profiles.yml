edp_analytics:
  target: local
  outputs:

    # -------------------------------------------------------------------------
    # local — DuckDB
    # Reads Silver Parquet files mounted at /data/silver inside Docker.
    # No AWS credentials needed. Used for local development and CI.
    # -------------------------------------------------------------------------
    local:
      type: duckdb
      path: /tmp/edp_analytics.duckdb
      schema: main
      threads: 4
      # dbt-duckdb reads external Parquet sources when a source table defines
      # meta.external_location in _sources.yml. No extra config needed here.

    # -------------------------------------------------------------------------
    # dev / staging / prod — Athena
    # Reads from Glue Catalog Silver database, writes Gold tables to S3.
    # All config is driven by environment variables injected by docker-compose.
    # -------------------------------------------------------------------------
    dev:
      type: athena
      region_name: eu-central-1
      database: AwsDataCatalog
      schema: "{{ env_var('DBT_ATHENA_SCHEMA', 'edp_dev_gold') }}"
      s3_staging_dir: "s3://{{ env_var('ATHENA_RESULTS_BUCKET') }}/dbt/"
      aws_profile_name: "{{ env_var('AWS_PROFILE', 'dev-admin') }}"
      threads: 4
      work_group: "{{ env_var('ATHENA_WORKGROUP', 'edp-dev-workgroup') }}"

    staging:
      type: athena
      region_name: eu-central-1
      database: AwsDataCatalog
      schema: "{{ env_var('DBT_ATHENA_SCHEMA', 'edp_staging_gold') }}"
      s3_staging_dir: "s3://{{ env_var('ATHENA_RESULTS_BUCKET') }}/dbt/"
      aws_profile_name: "{{ env_var('AWS_PROFILE', 'staging-admin') }}"
      threads: 4
      work_group: "{{ env_var('ATHENA_WORKGROUP', 'edp-staging-workgroup') }}"

    prod:
      type: athena
      region_name: eu-central-1
      database: AwsDataCatalog
      schema: "{{ env_var('DBT_ATHENA_SCHEMA', 'edp_prod_gold') }}"
      s3_staging_dir: "s3://{{ env_var('ATHENA_RESULTS_BUCKET') }}/dbt/"
      aws_profile_name: "{{ env_var('AWS_PROFILE', 'prod-admin') }}"
      threads: 4
      work_group: "{{ env_var('ATHENA_WORKGROUP', 'edp-prod-workgroup') }}"
