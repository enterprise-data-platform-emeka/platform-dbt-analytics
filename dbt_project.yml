name: edp_analytics
version: "1.0.0"
config-version: 2

# The profile that dbt uses to connect to the data warehouse.
# Matches the key in profiles.yml (or the profiles/ directory).
profile: edp_analytics

# Directories where dbt looks for models, tests, macros, etc.
model-paths: ["models"]
test-paths: ["tests"]
macro-paths: ["macros"]
seed-paths: ["seeds"]
snapshot-paths: ["snapshots"]
analysis-paths: ["analyses"]

# Compiled SQL and run artifacts go here. This directory is git-ignored.
target-path: "target"
clean-targets:
  - "target"
  - "dbt_packages"

# Model configurations per layer.
#
# Materialization strategy:
#   staging      -> view  : always reflects latest Silver data, zero storage cost
#   intermediate -> view  : queryable for debugging, no physical table, lazy evaluation
#   marts        -> table : persisted Gold tables that BI tools and Redshift query
#
# Tags allow selective runs: `dbt run --select tag:staging`
models:
  edp_analytics:
    staging:
      +materialized: view
      +tags: ["staging"]
      +schema: silver

    intermediate:
      +materialized: view
      +tags: ["intermediate"]

    marts:
      +materialized: table
      +tags: ["marts"]
      finance:
        +tags: ["finance"]
        +schema: gold
      product:
        +tags: ["product"]
        +schema: gold
      customer:
        +tags: ["customer"]
        +schema: gold
      operations:
        +tags: ["operations"]
        +schema: gold
