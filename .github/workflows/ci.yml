name: CI

# Validates dbt models on every pull request and push to main.
#
# Jobs (all run in parallel):
#   lint       - sqlfluff SQL linting on models/
#   dbt-local  - dbt deps + run + test + docs against DuckDB (no AWS needed)
#   build      - Docker image build (verifies Dockerfile is valid)
#
# No AWS credentials needed — DuckDB runs entirely in-process using local
# Parquet fixture files from data/silver/.
#
# The deploy workflow triggers only after this CI workflow completes
# successfully on main, ensuring broken models never reach Athena.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # --------------------------------------------------------------------------
  # SQL lint: sqlfluff
  # Checks all SQL models for style and syntax issues.
  # Uses the jinja templater so Jinja2 expressions in .sql files are handled
  # without needing a live dbt connection or AWS credentials.
  # --------------------------------------------------------------------------
  lint:
    name: SQL lint (sqlfluff)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install sqlfluff
        run: pip install sqlfluff

      - name: Lint SQL models
        # --templater jinja handles {{ ref() }} and {{ source() }} macros
        # without a live dbt connection. --dialect ansi covers standard SQL.
        run: sqlfluff lint models/ --dialect ansi --templater jinja

  # --------------------------------------------------------------------------
  # dbt local: DuckDB
  # Runs the full dbt pipeline against a local DuckDB database.
  # Silver data is read from data/silver/ as external Parquet sources.
  # No AWS credentials required.
  # --------------------------------------------------------------------------
  dbt-local:
    name: dbt local (DuckDB)
    runs-on: ubuntu-latest

    env:
      DBT_PROFILES_DIR: profiles
      DBT_SILVER_PATH: data/silver

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dbt dependencies
        run: pip install --no-cache-dir -r requirements.txt

      - name: dbt deps — download packages
        run: dbt deps --profiles-dir profiles --profile edp_analytics --target local

      - name: dbt run — compile and execute models
        run: dbt run --profiles-dir profiles --profile edp_analytics --target local

      - name: dbt test — run all data quality tests
        run: dbt test --profiles-dir profiles --profile edp_analytics --target local

      - name: dbt docs generate — build documentation site
        run: dbt docs generate --profiles-dir profiles --profile edp_analytics --target local

      - name: Upload dbt artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: dbt-artifacts
          path: |
            target/manifest.json
            target/run_results.json
            target/catalog.json
          retention-days: 7

  # --------------------------------------------------------------------------
  # Docker build
  # Verifies the Dockerfile builds successfully. Does not push.
  # Pushing happens in deploy.yml after CI passes on main.
  # --------------------------------------------------------------------------
  build:
    name: Build Docker image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build dbt Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: false
          tags: edp-dbt:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
