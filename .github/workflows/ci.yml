name: dbt CI

on:
  push:
    branches:
      - main
      - "feature/**"
      - "fix/**"
  pull_request:
    branches:
      - main

jobs:
  # ---------------------------------------------------------------------------
  # build
  # Build the Docker image and cache it for downstream jobs.
  # ---------------------------------------------------------------------------
  build:
    name: Build Docker image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build dbt Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: false
          tags: edp-dbt:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ---------------------------------------------------------------------------
  # dbt-local
  # Run dbt deps, run, test, and docs generate against DuckDB.
  # No AWS credentials required — Silver data is generated from a small fixture.
  # ---------------------------------------------------------------------------
  dbt-local:
    name: dbt local (DuckDB)
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dbt dependencies
        run: pip install --no-cache-dir -r requirements.txt

      # Create the Silver Parquet fixture directories that _sources.yml references.
      # In a full pipeline these would be written by the Glue PySpark jobs.
      # For CI we create empty directories so dbt can resolve sources without error.
      # Actual data quality is validated in integration tests against a real Glue run.
      - name: Create Silver fixture directories
        run: |
          mkdir -p data/silver/dim_customer
          mkdir -p data/silver/dim_product
          mkdir -p data/silver/fact_orders
          mkdir -p data/silver/fact_order_items
          mkdir -p data/silver/fact_payments
          mkdir -p data/silver/fact_shipments

      - name: dbt deps — download packages
        run: dbt deps --profiles-dir profiles --profile edp_analytics --target local
        env:
          DBT_PROFILES_DIR: profiles

      - name: dbt run — compile and execute models
        run: dbt run --profiles-dir profiles --profile edp_analytics --target local
        env:
          DBT_PROFILES_DIR: profiles

      - name: dbt test — run all data quality tests
        run: dbt test --profiles-dir profiles --profile edp_analytics --target local
        env:
          DBT_PROFILES_DIR: profiles

      - name: dbt docs generate — build documentation site
        run: dbt docs generate --profiles-dir profiles --profile edp_analytics --target local
        env:
          DBT_PROFILES_DIR: profiles

      - name: Upload dbt artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: dbt-artifacts
          path: |
            target/manifest.json
            target/run_results.json
            target/catalog.json
          retention-days: 7
