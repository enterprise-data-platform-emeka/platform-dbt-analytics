name: Deploy

# Runs dbt models against AWS Athena for a target environment.
#
# What "deploy" means here:
#   1. dbt deps  — install dbt packages
#   2. dbt run   — compile and execute all models against Athena (Gold layer)
#   3. dbt test  — run all data quality tests against the materialised tables
#
# The local DuckDB CI (ci.yml) validates SQL logic on every PR.
# This workflow promotes a validated commit to a real AWS environment.
#
# Triggers:
#   - push to main    → automatically deploys to dev
#   - workflow_dispatch → manually deploys to staging or prod
#
# Promotion path: dev (auto) → staging (manual) → prod (manual + approval)
#
# AWS authentication uses OIDC (no long-lived access keys).
# Required IAM role: edp-{env}-github-actions-role
#
# Required GitHub configuration:
#   Repository variables:
#     AWS_ACCOUNT_ID  — 12-digit AWS account ID
#   Environments: dev, staging, prod (Settings → Environments)
#     staging — add required reviewers
#     prod    — add required reviewers + deployment protection rules

on:
  # Triggers only after CI completes successfully on main.
  # This ensures dbt models validate against DuckDB before reaching Athena.
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]

  # Manual trigger for deploying to staging or prod.
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        type: choice
        options: [staging, prod]

jobs:
  deploy:
    name: Deploy to ${{ inputs.environment || 'dev' }}
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment || 'dev' }}

    # When triggered by workflow_run, only proceed if CI actually passed.
    # workflow_dispatch bypasses this check, manual deploys are intentional.
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}

    permissions:
      id-token: write
      contents: read

    env:
      ENV: ${{ inputs.environment || 'dev' }}
      DBT_PROFILES_DIR: profiles

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dbt and Athena adapter
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ vars.AWS_ACCOUNT_ID }}:role/edp-${{ env.ENV }}-github-actions-role
          aws-region: eu-central-1

      - name: Resolve AWS account ID
        id: account
        run: echo "id=$(aws sts get-caller-identity --query Account --output text)" >> "$GITHUB_OUTPUT"

      - name: dbt deps
        run: dbt deps --profile edp_analytics --target ${{ env.ENV }}

      - name: dbt run
        run: dbt run --profile edp_analytics --target ${{ env.ENV }}
        env:
          DBT_TARGET: ${{ env.ENV }}
          DBT_SILVER_DATABASE: edp_${{ env.ENV }}_silver
          DBT_SILVER_SCHEMA: edp_${{ env.ENV }}_silver
          DBT_ATHENA_DATABASE: edp_${{ env.ENV }}_gold
          DBT_ATHENA_SCHEMA: edp_${{ env.ENV }}_gold
          ATHENA_RESULTS_BUCKET: edp-${{ env.ENV }}-${{ steps.account.outputs.id }}-athena-results
          ATHENA_WORKGROUP: edp-${{ env.ENV }}-workgroup

      - name: dbt test
        run: dbt test --profile edp_analytics --target ${{ env.ENV }}
        env:
          DBT_TARGET: ${{ env.ENV }}
          DBT_SILVER_DATABASE: edp_${{ env.ENV }}_silver
          DBT_SILVER_SCHEMA: edp_${{ env.ENV }}_silver
          DBT_ATHENA_DATABASE: edp_${{ env.ENV }}_gold
          DBT_ATHENA_SCHEMA: edp_${{ env.ENV }}_gold
          ATHENA_RESULTS_BUCKET: edp-${{ env.ENV }}-${{ steps.account.outputs.id }}-athena-results
          ATHENA_WORKGROUP: edp-${{ env.ENV }}-workgroup

      - name: Build and publish MWAA plugins
        # Only runs after dbt test passes — broken models must not reach MWAA workers.
        # Builds plugins.zip from this checked-out repo, uploads it to the MWAA DAGs
        # S3 bucket, and calls aws mwaa update-environment only when the content has
        # actually changed. An ETag comparison prevents a needless 35-minute MWAA
        # environment update when dbt project files are identical to the last deploy.
        env:
          MWAA_ENV_NAME: edp-${{ env.ENV }}-mwaa
          MWAA_BUCKET: edp-${{ env.ENV }}-${{ steps.account.outputs.id }}-mwaa-dags
        run: |
          # Build plugins.zip with a top-level platform-dbt-analytics/ directory entry
          # so MWAA extracts it to /usr/local/airflow/plugins/platform-dbt-analytics/.
          cd "${GITHUB_WORKSPACE}/.."
          zip -r "${GITHUB_WORKSPACE}/plugins.zip" platform-dbt-analytics \
            --exclude "platform-dbt-analytics/.git/*" \
            --exclude "platform-dbt-analytics/__pycache__/*" \
            --exclude "platform-dbt-analytics/.venv/*" \
            --exclude "platform-dbt-analytics/target/*" \
            --exclude "platform-dbt-analytics/dbt_packages/*" \
            --exclude "platform-dbt-analytics/scripts/*" \
            --exclude "platform-dbt-analytics/data/*" \
            --exclude "platform-dbt-analytics/logs/*"
          cd "${GITHUB_WORKSPACE}"
          echo "plugins.zip built: $(du -sh plugins.zip | cut -f1)"

          # Get the ETag of the plugins version currently loaded on MWAA workers.
          CURRENT_VERSION=$(aws mwaa get-environment \
            --name "${MWAA_ENV_NAME}" \
            --query "Environment.PluginsS3ObjectVersion" \
            --output text 2>/dev/null || echo "NONE")

          if [ "${CURRENT_VERSION}" != "NONE" ] && [ "${CURRENT_VERSION}" != "None" ]; then
            CURRENT_ETAG=$(aws s3api head-object \
              --bucket "${MWAA_BUCKET}" \
              --key "plugins.zip" \
              --version-id "${CURRENT_VERSION}" \
              --query ETag \
              --output text 2>/dev/null || echo "")
          else
            CURRENT_ETAG=""
          fi

          # Upload the new plugins.zip and capture the new S3 version ID.
          NEW_VERSION=$(aws s3api put-object \
            --bucket "${MWAA_BUCKET}" \
            --key "plugins.zip" \
            --body plugins.zip \
            --query VersionId \
            --output text)

          NEW_ETAG=$(aws s3api head-object \
            --bucket "${MWAA_BUCKET}" \
            --key "plugins.zip" \
            --version-id "${NEW_VERSION}" \
            --query ETag \
            --output text)

          echo "Current plugins ETag : ${CURRENT_ETAG:-none}"
          echo "New plugins ETag     : ${NEW_ETAG}"

          if [ "${CURRENT_ETAG}" = "${NEW_ETAG}" ]; then
            echo "Plugins content unchanged. Skipping MWAA environment update."
          else
            echo "Plugins changed. Triggering MWAA environment update (~35 min)."
            aws mwaa update-environment \
              --name "${MWAA_ENV_NAME}" \
              --plugins-s3-object-version "${NEW_VERSION}"
            echo "MWAA environment update triggered successfully."
          fi

      - name: Upload dbt artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: dbt-artifacts-${{ env.ENV }}-${{ github.sha }}
          path: |
            target/manifest.json
            target/run_results.json
            target/catalog.json
          retention-days: 30
