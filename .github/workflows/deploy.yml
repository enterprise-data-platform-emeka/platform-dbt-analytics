name: Deploy

# Two-job deploy pipeline for the dbt analytics project.
#
# Job 1 — upload-dbt-to-s3 (always runs):
#   Syncs the dbt project to s3://{bronze-bucket}/dbt/platform-dbt-analytics/.
#   The run_dbt Glue job (Step Functions path) and the MWAA DAG (orchestration
#   path) both download from this prefix at runtime. The Bronze bucket always
#   exists regardless of which orchestrator is active. No MWAA update triggered.
#   dbt model changes take effect on the next pipeline run. Completes in seconds.
#
# Job 2 — run-dbt (runs after upload-dbt-to-s3):
#   Runs dbt against real Athena Silver data to materialise Gold tables.
#   On a fresh environment (Silver tables not yet populated by MWAA), this job
#   fails. That is expected. The MWAA pipeline must run first to populate Silver,
#   then re-trigger this workflow manually for run-dbt to succeed.
#
# MWAA environment updates are NEVER triggered by this workflow. plugins.zip is
# a permanent placeholder created by Terraform and never touched again. The only
# thing that triggers a MWAA update is a requirements.txt change in the
# platform-orchestration-mwaa-airflow repo.
#
# First-deploy sequence (after make apply dev):
#   1. Trigger this workflow → dbt project synced to S3 (seconds)
#   2. Trigger platform-orchestration-mwaa-airflow deploy → DAG uploaded
#      (MWAA update only if requirements.txt changed, ~35 min)
#   3. After MWAA is Available: trigger the edp_pipeline DAG in the Airflow UI
#   4. After the pipeline completes: re-trigger this workflow → run-dbt succeeds
#
# Promotion path: dev (auto on CI pass) → staging (manual) → prod (manual + approval)
#
# AWS authentication uses OIDC (no long-lived access keys).
# Required IAM role: edp-{env}-github-actions-role
#
# Required GitHub configuration:
#   Repository variables:
#     AWS_ACCOUNT_ID  — 12-digit AWS account ID
#   Environments: dev, staging, prod (Settings → Environments)
#     staging — add required reviewers
#     prod    — add required reviewers + deployment protection rules

on:
  # Triggers only after CI completes successfully on main.
  # This ensures dbt models validate against DuckDB before reaching Athena.
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]

  # Manual trigger: deploy to staging/prod, or re-run run-dbt after MWAA
  # has populated Silver on a fresh environment.
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        type: choice
        options: [dev, staging, prod]

# ── Job 1: Upload dbt project to S3 ───────────────────────────────────────────

jobs:
  upload-dbt-to-s3:
    name: Upload dbt project to S3 (${{ inputs.environment || 'dev' }})
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment || 'dev' }}

    # When triggered by workflow_run, only proceed if CI actually passed.
    # workflow_dispatch bypasses this check — manual deploys are intentional.
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}

    permissions:
      id-token: write
      contents: read

    env:
      ENV: ${{ inputs.environment || 'dev' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ vars.AWS_ACCOUNT_ID }}:role/edp-${{ env.ENV }}-github-actions-role
          aws-region: eu-central-1

      - name: Resolve AWS account ID
        id: account
        run: echo "id=$(aws sts get-caller-identity --query Account --output text)" >> "$GITHUB_OUTPUT"

      - name: Sync dbt project to S3
        # The run_dbt Glue job (Step Functions path) downloads the project from
        # s3://{bronze-bucket}/dbt/platform-dbt-analytics/ at startup.
        # The MWAA DAG (orchestration path) also reads from here via the same prefix.
        # The Bronze bucket always exists regardless of which orchestrator is active.
        env:
          BRONZE_BUCKET: edp-${{ env.ENV }}-${{ steps.account.outputs.id }}-bronze
        run: |
          aws s3 sync . s3://${BRONZE_BUCKET}/dbt/platform-dbt-analytics/ \
            --delete \
            --exclude ".git/*" \
            --exclude ".github/*" \
            --exclude "__pycache__/*" \
            --exclude ".venv/*" \
            --exclude "target/*" \
            --exclude "dbt_packages/*" \
            --exclude "logs/*"
          echo "dbt project synced to s3://${BRONZE_BUCKET}/dbt/platform-dbt-analytics/"

# ── Job 2: Run dbt against Athena ─────────────────────────────────────────────

  run-dbt:
    name: Run dbt on ${{ inputs.environment || 'dev' }}
    needs: upload-dbt-to-s3
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment || 'dev' }}

    permissions:
      id-token: write
      contents: read

    env:
      ENV: ${{ inputs.environment || 'dev' }}
      DBT_PROFILES_DIR: profiles

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dbt and Athena adapter
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ vars.AWS_ACCOUNT_ID }}:role/edp-${{ env.ENV }}-github-actions-role
          aws-region: eu-central-1

      - name: Resolve AWS account ID
        id: account
        run: echo "id=$(aws sts get-caller-identity --query Account --output text)" >> "$GITHUB_OUTPUT"

      - name: dbt deps
        run: dbt deps --profile edp_analytics --target ${{ env.ENV }}

      - name: dbt run
        run: dbt run --profile edp_analytics --target ${{ env.ENV }}
        env:
          DBT_TARGET: ${{ env.ENV }}
          DBT_SILVER_DATABASE: edp_${{ env.ENV }}_silver
          DBT_SILVER_SCHEMA: edp_${{ env.ENV }}_silver
          DBT_ATHENA_DATABASE: edp_${{ env.ENV }}_gold
          DBT_ATHENA_SCHEMA: edp_${{ env.ENV }}_gold
          ATHENA_RESULTS_BUCKET: edp-${{ env.ENV }}-${{ steps.account.outputs.id }}-athena-results
          ATHENA_WORKGROUP: edp-${{ env.ENV }}-workgroup

      - name: dbt test
        run: dbt test --profile edp_analytics --target ${{ env.ENV }}
        env:
          DBT_TARGET: ${{ env.ENV }}
          DBT_SILVER_DATABASE: edp_${{ env.ENV }}_silver
          DBT_SILVER_SCHEMA: edp_${{ env.ENV }}_silver
          DBT_ATHENA_DATABASE: edp_${{ env.ENV }}_gold
          DBT_ATHENA_SCHEMA: edp_${{ env.ENV }}_gold
          ATHENA_RESULTS_BUCKET: edp-${{ env.ENV }}-${{ steps.account.outputs.id }}-athena-results
          ATHENA_WORKGROUP: edp-${{ env.ENV }}-workgroup

      - name: Upload dbt artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: dbt-artifacts-${{ env.ENV }}-${{ github.sha }}
          path: |
            target/manifest.json
            target/run_results.json
            target/catalog.json
          retention-days: 30
