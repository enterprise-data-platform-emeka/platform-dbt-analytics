version: 2

models:
  # ----------------------------------------------------------------------------
  # dim_customers
  # ----------------------------------------------------------------------------
  - name: dim_customers
    description: >
      Gold-layer customer dimension. One row per customer, enriched with lifetime
      purchase metrics. This is the primary table for customer analytics: lifetime
      value segmentation, country-level cohort analysis, repeat purchase rates,
      and customer acquisition trend reporting.
      The lifetime metrics (total_orders, lifetime_value, first/last order date)
      are computed with a LEFT JOIN to int_orders_enriched so customers who have
      never placed an order still appear in the table with zero/null metrics.
    columns:
      - name: customer_id
        description: Primary key. Unique identifier for each customer.
        data_tests:
          - not_null
          - unique

      - name: first_name
        description: Customer's given name.
        data_tests:
          - not_null

      - name: last_name
        description: Customer's family name.
        data_tests:
          - not_null

      - name: email
        description: Customer email address. Unique natural key from the source system.
        data_tests:
          - not_null
          - unique

      - name: country
        description: Customer's country of residence (lowercased).

      - name: signup_date
        description: Date the customer account was created.
        data_tests:
          - not_null

      - name: total_orders
        description: >
          Count of distinct orders placed by this customer across all time.
          Zero for customers who have never ordered.

      - name: lifetime_value
        description: >
          Sum of all payment_amount values across every order this customer has
          placed. Null for customers who have never ordered (no payment records).

      - name: first_order_date
        description: Date of the customer's earliest order. Null for customers with no orders.

      - name: last_order_date
        description: Date of the customer's most recent order. Null for customers with no orders.
