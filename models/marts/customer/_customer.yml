version: 2

models:
  - name: customer_segments
    description: >
      Answers: "How are customers segmented by value and activity?"
      One row per customer. Joins customers, orders, and payments to compute
      lifetime value and order count, then assigns each customer a value
      segment (VIP, Regular, Low Value, Never Ordered) and an order frequency
      band (No Orders, One-Time, Occasional, Loyal). Ordered by lifetime
      value descending so highest-value customers appear first.
    columns:
      - name: customer_id
        description: Unique identifier for the customer.
        tests:
          - not_null
          - unique
      - name: first_name
        description: Customer first name.
        tests:
          - not_null
      - name: last_name
        description: Customer last name.
        tests:
          - not_null
      - name: email
        description: Customer email address.
        tests:
          - not_null
      - name: country
        description: Country associated with the customer account.
      - name: signup_date
        description: Date the customer registered.
      - name: total_orders
        description: Count of distinct orders placed by this customer.
      - name: lifetime_value
        description: Sum of all payment amounts linked to this customer's orders.
      - name: first_order_date
        description: Date of the customer's earliest order.
      - name: last_order_date
        description: Date of the customer's most recent order.
      - name: segment
        description: Value-based segment derived from lifetime_value.
        tests:
          - not_null
          - accepted_values:
              values: ['VIP', 'Regular', 'Low Value', 'Never Ordered']
      - name: order_frequency_band
        description: Activity band derived from total_orders.
        tests:
          - not_null
          - accepted_values:
              values: ['No Orders', 'One-Time', 'Occasional', 'Loyal']
