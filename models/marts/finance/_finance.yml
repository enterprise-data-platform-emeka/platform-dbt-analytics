version: 2

models:
  - name: revenue_by_country
    description: >
      Answers: "Which countries generate the most revenue?"
      One row per country. Aggregates completed orders only, showing total
      orders, unique customers, total revenue, and average order value.
      Ordered by total revenue descending so the highest-value markets
      appear first.
    columns:
      - name: country
        description: Customer country derived from stg_customers via int_orders_enriched.
        tests:
          - not_null
      - name: total_orders
        description: Count of distinct completed orders from this country.
        tests:
          - not_null
      - name: total_customers
        description: Count of distinct customers who placed completed orders from this country.
        tests:
          - not_null
      - name: total_revenue
        description: Sum of payment_amount for completed orders from this country.
      - name: avg_order_value
        description: total_revenue divided by total_orders. Null-safe via nullif.

  - name: monthly_revenue_trend
    config:
      where: "order_year = extract(year from current_date) and order_month = 3"
    description: >
      Answers: "How is revenue trending month over month?"
      One row per year-month combination. Covers all orders regardless of
      payment status so cancelled orders are visible alongside revenue,
      giving a complete picture of order volume and cancellation patterns
      over time.
    columns:
      - name: order_year
        description: Four-digit year extracted from order_date.
        tests:
          - not_null
      - name: order_month
        description: Numeric month (1-12) extracted from order_date.
        tests:
          - not_null
      - name: total_orders
        description: Count of distinct orders placed in this year-month.
        tests:
          - not_null
      - name: unique_customers
        description: Count of distinct customers who ordered in this year-month.
        tests:
          - not_null
      - name: total_revenue
        description: Sum of payment_amount for all orders in this year-month.
      - name: cancelled_orders
        description: Count of orders with order_status = 'cancelled' in this year-month.

  - name: payment_method_performance
    description: >
      Answers: "Which payment methods succeed and which fail?"
      One row per payment method. Shows transaction counts broken down by
      status (completed, failed, refunded), a success rate percentage, total
      amount processed, and revenue actually captured (completed only).
      Sourced directly from stg_payments so it reflects every transaction
      regardless of order context.
    columns:
      - name: payment_method
        description: Payment method used (e.g. credit_card, paypal, bank_transfer).
        tests:
          - not_null
      - name: total_transactions
        description: Total number of payment attempts for this method.
        tests:
          - not_null
      - name: completed_count
        description: Count of transactions with payment_status = 'completed'.
      - name: failed_count
        description: Count of transactions with payment_status = 'failed'.
      - name: refunded
        description: Count of transactions with payment_status = 'refunded'.
      - name: success_rate_pct
        description: Percentage of transactions that completed successfully, rounded to 1 decimal.
      - name: total_processed
        description: Sum of amount across all transactions for this payment method.
      - name: revenue_captured
        description: Sum of amount for completed transactions only.
