version: 2

models:
  - name: product_category_performance
    description: >
      Answers: "Which product categories and brands drive the most revenue?"
      One row per category-brand combination. Aggregates order count, unique
      product count, units sold, total revenue, and average revenue per unit
      from int_product_sales. Ordered by total revenue descending.
    columns:
      - name: category
        description: Product category (e.g. Electronics, Clothing).
        tests:
          - not_null
      - name: brand
        description: Product brand within the category.
        tests:
          - not_null
      - name: total_orders
        description: Count of distinct orders containing products in this category-brand.
        tests:
          - not_null
      - name: products_in_category
        description: Count of distinct products sold within this category-brand combination.
      - name: total_units_sold
        description: Sum of quantity across all order items in this category-brand.
        tests:
          - not_null
      - name: total_revenue
        description: Sum of line_total for all order items in this category-brand.
      - name: avg_revenue_per_unit
        description: total_revenue divided by total_units_sold. Null-safe via nullif.

  - name: top_selling_products
    description: >
      Answers: "Which specific products sell the most?"
      One row per product. Shows order count, units sold, total revenue,
      average revenue per unit, and a revenue rank (rank 1 = highest revenue).
      Sourced from int_product_sales which already carries product attributes
      (name, category, brand) alongside line-level sales figures.
    columns:
      - name: product_id
        description: Unique identifier for the product.
        tests:
          - not_null
          - unique
      - name: product_name
        description: Display name of the product.
        tests:
          - not_null
      - name: category
        description: Product category.
        tests:
          - not_null
      - name: brand
        description: Product brand.
        tests:
          - not_null
      - name: total_orders
        description: Count of distinct orders that included this product.
      - name: total_units_sold
        description: Total quantity of this product sold across all orders.
      - name: total_revenue
        description: Sum of line_total for this product across all orders.
      - name: avg_revenue_per_unit
        description: total_revenue divided by total_units_sold. Null-safe via nullif.
      - name: revenue_rank
        description: Dense rank ordered by total_revenue descending. Rank 1 is the highest-revenue product.
